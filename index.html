<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FieldIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html { font-size:16px; }
    body { background:#04080f; font-family:'DM Sans','Segoe UI',sans-serif; color:#fff; min-height:100vh; }
    #root { width:100%; min-height:100vh; }
    .app-shell { width:100%; background:#080f17; min-height:100vh; position:relative; }
    @media(min-width:600px)  { html { font-size:17px; } }
    @media(min-width:900px)  { html { font-size:19px; } }
    @media(min-width:1200px) { html { font-size:21px; } }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#2a3a4a; border-radius:2px; }
    select option { background:#0f1923; }
    @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ── Storage ───────────────────────────────────────────────────────────────────
const STORE_KEY = "fieldiq_v2";
const JBIN_API  = "fieldiq_jbin_key";
const JBIN_BIN  = "fieldiq_jbin_bin";
const load    = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY))||null; } catch { return null; } };
const save    = d  => localStorage.setItem(STORE_KEY, JSON.stringify(d));
const uid     = () => Math.random().toString(36).slice(2,9);
const defState= () => ({ players:[], gameInfo:{ team:"", gameNumber:"", date:"", type:"" }, plays:[] });

// Yard range scores: short=1, medium=2, long=3
const YARD_RANGES = [
  { value:"short",  label:"Short",  sub:"0-5 yds",   score:1 },
  { value:"medium", label:"Medium", sub:"6-20 yds",  score:2 },
  { value:"long",   label:"Long",   sub:"21-50 yds", score:3 },
];
const yardScore = range => YARD_RANGES.find(r=>r.value===range)?.score || 0;

// Play result config
const RESULTS = [
  { value:"caught",        label:"🙌 Caught",       color:"#22c55e", needsQb:true,  needsYards:true,  needsTD:true  },
  { value:"missed",        label:"❌ Missed",        color:"#ef4444", needsQb:true,  needsYards:false, needsTD:false },
  { value:"flag",          label:"🚩 Flag Pull",     color:"#f59e0b", needsQb:false, needsYards:false, needsTD:false },
  { value:"interception",  label:"🛡 Interception",  color:"#3b82f6", needsQb:true,  needsYards:true,  needsTD:true  },
];
const resultCfg = v => RESULTS.find(r=>r.value===v) || {};

// ── JSONBin ───────────────────────────────────────────────────────────────────
const jbCreate = async (key, body) => {
  const r = await fetch("https://api.jsonbin.io/v3/b", { method:"POST", headers:{"Content-Type":"application/json","X-Master-Key":key,"X-Bin-Private":"false"}, body:JSON.stringify(body) });
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).metadata.id;
};
const jbUpdate = async (key, id, body) => {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${id}`, { method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":key}, body:JSON.stringify(body) });
  if (!r.ok) throw new Error(r.status);
};
const jbRead = async id => {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`);
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).record;
};

// ── Snapshot helpers ──────────────────────────────────────────────────────────
const statsToSnap = (stats, gi, updatedAt) => ({
  g: gi,
  p: stats.map(p=>({ n:p.name, num:p.number, pos:p.positions, c:p.caught.length, m:p.missed.length, f:p.flag.length, s:p.score, isQb:p.isQb, comp:p.comp.length, inc:p.inc.length, thrown:p.thrown.length, compPct:p.compPct, tds:p.tds, interceptions:p.interceptions.length, avgYards:p.avgYards })),
  ts: updatedAt ? new Date(updatedAt).getTime() : Date.now()
});

// ── QR Code ───────────────────────────────────────────────────────────────────
function QRCode({ url }) {
  return (
    <div style={{display:"flex",justifyContent:"center",margin:"8px 0 16px"}}>
      <div style={{padding:10,background:"#0f1923",borderRadius:14,border:"1px solid #00e5ff33"}}>
        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=00e5ff&bgcolor=0f1923&data=${encodeURIComponent(url)}`} width={160} height={160} alt="QR" style={{display:"block",borderRadius:6}}/>
      </div>
    </div>
  );
}

// ── Read-only view ────────────────────────────────────────────────────────────
function ROView({ snap }) {
  const { g, p:pl, ts } = snap;
  const maxC = Math.max(1,...pl.map(p=>p.c));
  const maxF = Math.max(1,...pl.map(p=>p.f));
  const maxY = Math.max(1,...pl.map(p=>p.avgYards||0));
  const ranked = [...pl].sort((a,b)=>b.s-a.s);
  const updAt  = ts ? new Date(ts).toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
  const Bar = ({label,pct,color,sub}) => (
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.625rem",color:"#888",marginBottom:3}}>
        <span style={{textTransform:"uppercase",letterSpacing:.8}}>{label}</span>
        <span style={{color,fontWeight:700}}>{sub}</span>
      </div>
      <div style={{background:"#080f17",borderRadius:5,height:8,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:5,background:`linear-gradient(90deg,${color}88,${color})`,width:`${Math.max(pct,2)}%`,boxShadow:`0 0 6px ${color}44`}}/>
      </div>
    </div>
  );
  return (
    <div className="app-shell">
      <div style={{background:"linear-gradient(160deg,#0a1e35,#05111e)",padding:"24px 20px 18px",position:"relative",overflow:"hidden"}}>
        <svg style={{position:"absolute",top:0,right:0,opacity:.05}} width="200" height="100" viewBox="0 0 200 100">{[0,20,40,60,80,100,120,140,160,180,200].map(x=><line key={x} x1={x} y1="0" x2={x} y2="100" stroke="#fff" strokeWidth=".5"/>)}<line x1="0" y1="50" x2="200" y2="50" stroke="#fff" strokeWidth="1"/></svg>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <svg width="32" height="32" viewBox="0 0 36 36"><ellipse cx="18" cy="18" rx="14" ry="9" fill="#c97b3c"/><ellipse cx="18" cy="18" rx="14" ry="9" fill="none" stroke="#a0612c" strokeWidth="1.5"/><line x1="8" y1="18" x2="28" y2="18" stroke="#fff" strokeWidth="1.5"/><line x1="14" y1="13" x2="14" y2="23" stroke="#fff" strokeWidth="1.2"/><line x1="18" y1="11" x2="18" y2="25" stroke="#fff" strokeWidth="1.2"/><line x1="22" y1="13" x2="22" y2="23" stroke="#fff" strokeWidth="1.2"/></svg>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.2rem",letterSpacing:4,lineHeight:1,background:"linear-gradient(90deg,#fff,#00e5ff 60%,#0090a8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>FieldIQ</div>
            <div style={{fontSize:"0.55rem",color:"#00e5ff99",letterSpacing:3,textTransform:"uppercase"}}>Stats · Read Only</div>
          </div>
          {g.team&&<div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontSize:"0.75rem",color:"#00e5ff",fontWeight:700}}>{g.team}</div>{g.gameNumber&&<div style={{fontSize:"0.65rem",color:"#666"}}>Game #{g.gameNumber}</div>}</div>}
        </div>
        <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap",alignItems:"center"}}>
          {g.date&&<span style={{fontSize:"0.7rem",color:"#888"}}>{g.date}</span>}
          {g.type&&<span style={{fontSize:"0.65rem",background:"#ffffff11",color:"#888",borderRadius:20,padding:"2px 9px"}}>{g.type}</span>}
          <span style={{fontSize:"0.65rem",color:"#334",marginLeft:"auto"}}>Updated {updAt}</span>
        </div>
      </div>
      <div style={{padding:"1rem"}}>
        <div style={{fontSize:"0.7rem",color:"#888",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>🏆 Player Rankings</div>
        <div style={{fontSize:"0.65rem",color:"#445",marginBottom:14}}>Score = catches×2 + flag pulls + TDs×3 + INTs×2</div>
        {ranked.map((p,i)=>{
          const cp=Math.round(p.c/maxC*100), fp=Math.round(p.f/maxF*100), yp=maxY>0?Math.round((p.avgYards||0)/maxY*100):0;
          const cr=(p.c+p.m)>0?Math.round(p.c/(p.c+p.m)*100):0;
          const rc=i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"#334";
          return (
            <div key={i} style={{background:i===0?"linear-gradient(135deg,#112030,#0e1a2a)":"#111d29",borderRadius:13,marginBottom:7,border:i===0?"1px solid #00e5ff28":"1px solid #1a2636",padding:"0.75rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.2rem",color:rc,minWidth:18,textAlign:"center"}}>{i+1}</div>
                <div style={{background:"#00e5ff18",color:"#00e5ff",fontFamily:"'Bebas Neue',sans-serif",fontSize:"0.95rem",borderRadius:6,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{p.num}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:"0.875rem"}}>{p.n}</div>
                  <div style={{display:"flex",gap:3,marginTop:2}}>{p.pos.map(pos=><span key={pos} style={{background:pos==="quarterback"?"#ff6b3522":"#00e5ff22",color:pos==="quarterback"?"#ff6b35":"#00e5ff",border:`1px solid ${pos==="quarterback"?"#ff6b3555":"#00e5ff55"}`,borderRadius:4,padding:"1px 6px",fontSize:"0.6rem",fontWeight:700,textTransform:"uppercase"}}>{pos==="quarterback"?"QB":"PL"}</span>)}</div>
                </div>
                <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  <span style={{fontSize:"0.75rem",color:"#22c55e",fontWeight:700}}>{p.c}C</span>
                  <span style={{fontSize:"0.65rem",color:"#334"}}>·</span>
                  <span style={{fontSize:"0.75rem",color:"#f59e0b",fontWeight:700}}>{p.f}F</span>
                  {p.tds>0&&<><span style={{fontSize:"0.65rem",color:"#334"}}>·</span><span style={{fontSize:"0.75rem",color:"#ffd700",fontWeight:700}}>{p.tds}TD</span></>}
                  {p.interceptions>0&&<><span style={{fontSize:"0.65rem",color:"#334"}}>·</span><span style={{fontSize:"0.75rem",color:"#3b82f6",fontWeight:700}}>{p.interceptions}INT</span></>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.6rem",color:"#00e5ff",lineHeight:1}}>{p.s}</div>
                  <div style={{fontSize:"0.5rem",color:"#445",textTransform:"uppercase"}}>IQ</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                {[{v:p.c,l:"Catches",col:"#22c55e"},{v:p.m,l:"Missed",col:"#ef4444"},{v:p.f,l:"Flag Pulls",col:"#f59e0b"},{v:p.tds,l:"TDs",col:"#ffd700"},{v:p.interceptions,l:"INTs",col:"#3b82f6"}].map(s=>(
                  <div key={s.l} style={{flex:"1 1 30%",background:"#0a1420",borderRadius:8,padding:"7px 4px",textAlign:"center",border:`1px solid ${s.col}33`,minWidth:50}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.3rem",color:s.col,lineHeight:1}}>{s.v}</div>
                    <div style={{fontSize:"0.5rem",color:"#667",textTransform:"uppercase",letterSpacing:.8,marginTop:1}}>{s.l}</div>
                  </div>
                ))}
              </div>
              {p.avgYards>0&&<div style={{background:"#0a1420",borderRadius:8,padding:"8px 12px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"0.7rem",color:"#888",textTransform:"uppercase",letterSpacing:.8}}>Avg Yard Score</span><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#a855f7",lineHeight:1}}>{p.avgYards}</span></div>}
              <div style={{background:"#0a1420",borderRadius:9,padding:"10px 10px 4px"}}>
                <Bar label="Catches vs Best" pct={cp} color="#22c55e" sub={`${p.c} · ${cp}%`}/>
                <Bar label="Flag Pulls vs Best" pct={fp} color="#f59e0b" sub={`${p.f} · ${fp}%`}/>
                {maxY>0&&<Bar label="Avg Yard Score vs Best" pct={yp} color="#a855f7" sub={p.avgYards>0?`${p.avgYards} avg score`:"No yard plays"}/>}
                {p.isQb&&<Bar label="Pass Completion %" pct={p.compPct} color="#ff6b35" sub={p.thrown>0?`${p.comp}/${p.thrown} · ${p.compPct}%`:"No attempts"}/>}
                {(p.c+p.m)>0&&<Bar label="Catch Rate" pct={cr} color="#00e5ff" sub={`${cr}%`}/>}
              </div>
              {p.isQb&&p.thrown>0&&(
                <div style={{marginTop:10}}>
                  <div style={{fontSize:"0.55rem",color:"#ff6b3577",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>As Quarterback</div>
                  <div style={{display:"flex",gap:6}}>
                    {[{v:p.comp,l:"Comp",col:"#22c55e"},{v:p.inc,l:"Inc",col:"#ef4444"},{v:p.thrown,l:"Att",col:"#ff6b35"}].map(s=>(
                      <div key={s.l} style={{flex:1,background:"#0a1420",borderRadius:8,padding:"8px 4px",textAlign:"center",border:`1px solid ${s.col}33`}}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.25rem",color:s.col,lineHeight:1}}>{s.v}</div>
                        <div style={{fontSize:"0.55rem",color:"#667",textTransform:"uppercase",letterSpacing:.8,marginTop:1}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        <div style={{textAlign:"center",marginTop:24,padding:"1rem",background:"#0f1923",borderRadius:12,border:"1px solid #1a2636"}}>
          <div style={{fontSize:"0.7rem",color:"#556"}}>Powered by</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",letterSpacing:3,color:"#00e5ff66"}}>FieldIQ</div>
        </div>
      </div>
    </div>
  );
}

// ── Live team loader (parents) ────────────────────────────────────────────────
function LiveView({ binId }) {
  const [snap,setSnap]=useState(null); const [err,setErr]=useState(false);
  useEffect(()=>{ jbRead(binId).then(d=>setSnap(statsToSnap(d.stats,d.gameInfo,d.updatedAt))).catch(()=>setErr(true)); },[]);
  if(err) return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#080f17",minHeight:"100vh",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,padding:20}}><div style={{fontSize:"2.5rem"}}>😕</div><div style={{fontWeight:700}}>Couldn't load stats</div><div style={{fontSize:"0.8rem",color:"#888",textAlign:"center"}}>The link may be invalid or stats haven't been published yet.</div></div>;
  if(!snap) return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#080f17",minHeight:"100vh",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div style={{fontSize:"1.5rem"}}>⏳</div><div style={{fontSize:"0.875rem",color:"#888"}}>Loading team stats…</div></div>;
  return <ROView snap={snap}/>;
}

// ── Share sheet with auto-push ────────────────────────────────────────────────
function ShareSheet({ ranked, gameInfo, onClose }) {
  const baseUrl = window.location.origin + window.location.pathname;
  const [apiKey,  setApiKey]  = useState(()=>localStorage.getItem(JBIN_API)||"");
  const [binId,   setBinId]   = useState(()=>localStorage.getItem(JBIN_BIN)||"");
  const [status,  setStatus]  = useState("idle");
  const [liveUrl, setLiveUrl] = useState(()=>{ const b=localStorage.getItem(JBIN_BIN); return b?`${baseUrl}?team=${b}`:""; });
  const [copied,  setCopied]  = useState(false);
  const [lastPush,setLastPush]= useState(null);

  const doPublish = async (key, id) => {
    const payload = { gameInfo, stats:ranked, updatedAt:new Date().toISOString() };
    let bid = id;
    if (!bid) { bid = await jbCreate(key, payload); localStorage.setItem(JBIN_BIN,bid); setBinId(bid); }
    else { await jbUpdate(key, bid, payload); }
    localStorage.setItem(JBIN_API, key);
    return bid;
  };

  const publish = async () => {
    if (!apiKey.trim()) { setStatus("err"); return; }
    setStatus("busy");
    try {
      const bid = await doPublish(apiKey.trim(), binId);
      const url = `${baseUrl}?team=${bid}`;
      setLiveUrl(url); setStatus("done"); setLastPush(new Date());
    } catch { setStatus("err"); }
  };

  const copy  = () => { navigator.clipboard?.writeText(liveUrl).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); }); };
  const reset = () => { localStorage.removeItem(JBIN_BIN); setBinId(""); setLiveUrl(""); setStatus("idle"); };

  // Auto-push every 60s if live link is active
  useEffect(()=>{
    if (!liveUrl || !apiKey) return;
    const interval = setInterval(async ()=>{
      try { await doPublish(apiKey, binId||localStorage.getItem(JBIN_BIN)||""); setLastPush(new Date()); } catch {}
    }, 60000);
    return ()=>clearInterval(interval);
  }, [liveUrl, apiKey, binId, ranked, gameInfo]);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0f1923",borderRadius:"20px 20px 0 0",width:"100%",padding:"24px 20px 40px",borderTop:"2px solid #00e5ff55",animation:"slideUp .25s ease",maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",letterSpacing:2}}>Share Live Stats</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#aaa",fontSize:22,cursor:"pointer"}}>✕</button>
        </div>
        {liveUrl ? (
          <>
            <div style={{background:"#22c55e18",border:"1px solid #22c55e44",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:"0.75rem",color:"#22c55e",lineHeight:1.6}}>
              ✓ Live — auto-updates every 60 seconds. Parents bookmark once, always see latest stats.
              {lastPush&&<div style={{color:"#22c55e99",marginTop:2}}>Last pushed: {lastPush.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>}
            </div>
            <QRCode url={liveUrl}/>
            <div style={{display:"flex",gap:8,alignItems:"center",background:"#1a2636",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
              <span style={{flex:1,fontSize:"0.7rem",color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{liveUrl}</span>
              <button onClick={copy} style={{background:copied?"#22c55e22":"#00e5ff22",border:`1px solid ${copied?"#22c55e":"#00e5ff"}55`,color:copied?"#22c55e":"#00e5ff",borderRadius:8,padding:"6px 14px",fontSize:"0.75rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>{copied?"✓ Copied":"Copy Link"}</button>
            </div>
            {navigator.share&&<button onClick={()=>navigator.share({title:"FieldIQ Stats",url:liveUrl})} style={{width:"100%",background:"linear-gradient(135deg,#00e5ff,#0090a8)",border:"none",color:"#fff",borderRadius:10,padding:"13px",fontSize:"0.875rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>Share via…</button>}
            {status==="err"&&<div style={{fontSize:"0.7rem",color:"#ef4444",textAlign:"center",marginBottom:8}}>Auto-push failed. Check your API key.</div>}
            <button onClick={reset} style={{width:"100%",background:"transparent",border:"none",color:"#445",fontSize:"0.7rem",cursor:"pointer",fontFamily:"inherit"}}>Reset (generate a new link)</button>
          </>
        ) : (
          <>
            <p style={{fontSize:"0.75rem",color:"#888",marginBottom:16,lineHeight:1.6}}>
              Publish to a <span style={{color:"#00e5ff"}}>permanent link</span> that auto-updates every 60 seconds. Parents bookmark it once.
            </p>
            <div style={{background:"#1a2636",borderRadius:12,padding:"1rem",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:"0.875rem",marginBottom:8}}>One-time setup</div>
              <div style={{fontSize:"0.7rem",color:"#888",lineHeight:1.8,marginBottom:12}}>
                1. Go to <span style={{color:"#00e5ff",fontWeight:700}}>jsonbin.io</span> → free account<br/>
                2. Click <strong style={{color:"#fff"}}>API Keys</strong> → <strong style={{color:"#fff"}}>Create Access Key</strong><br/>
                3. Copy the <strong style={{color:"#fff"}}>X-Master-Key</strong> (starts with $2b$)<br/>
                4. Paste it below — saved to your device only
              </div>
              <label style={{display:"block",fontSize:"0.7rem",letterSpacing:1,color:"#888",marginBottom:5,textTransform:"uppercase"}}>X-Master-Key</label>
              <input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="$2b$10$..."
                style={{width:"100%",background:"#0f1923",border:`1px solid ${status==="err"?"#ef4444":"#2a3a4a"}`,borderRadius:10,color:"#fff",padding:"11px 14px",fontSize:"0.8125rem",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
              {status==="err"&&<div style={{fontSize:"0.7rem",color:"#ef4444",marginTop:6}}>Invalid key or network error. Double-check and try again.</div>}
            </div>

}

function BackupSheet({ data, onImport, onClose, showToast }) {
  const ref=useRef();
  const doExport=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url; a.download=`${(data.gameInfo?.team||"fieldiq").replace(/\s+/g,"-").toLowerCase()}-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
    showToast("Backup downloaded! ✓");
  };
  const doImport=e=>{
    const file=e.target.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{ try { const p=JSON.parse(ev.target.result); if(!p.players||!p.plays)throw 0; onImport(p); showToast("Data restored! ✓"); onClose(); } catch { showToast("Invalid backup file","#ef4444"); } };
    r.readAsText(file); e.target.value="";
  };
  return (
    <Sheet title="Backup & Restore" onClose={onClose} accent="#f59e0b">
      <div style={{background:"#1a2636",borderRadius:12,padding:"1rem",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:"0.875rem",marginBottom:4}}>📤 Export Backup</div>

      </div>
      <div style={{background:"#1a2636",borderRadius:12,padding:"1rem",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:"0.875rem",marginBottom:4}}>📥 Restore Backup</div>
        <div style={{fontSize:"0.75rem",color:"#888",lineHeight:1.6,marginBottom:12}}>Load a backup file. <span style={{color:"#ef4444"}}>Replaces all current data.</span></div>
        <input ref={ref} type="file" accept=".json" onChange={doImport} style={{display:"none"}}/>
        <button onClick={()=>ref.current.click()} style={{width:"100%",background:"#1e2d3d",border:"1px solid #2a3a4a",color:"#fff",borderRadius:10,padding:"12px",fontSize:"0.875rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Choose Backup File…</button>
      </div>
      <div style={{fontSize:"0.7rem",color:"#445",textAlign:"center"}}>💡 Export before clearing your browser cache or switching devices.</div>
    </Sheet>
  );
}

        <div><div style={{fontWeight:700,fontSize:"1rem"}}>{form.name||player.name}</div><div style={{fontSize:"0.7rem",color:"#888",marginTop:2}}>{playCount} play{playCount!==1?"s":""} recorded</div></div>
      </div>
      <FInput label="Jersey Number" type="number" value={form.number} onChange={e=>setForm(f=>({...f,number:e.target.value}))} placeholder="e.g. 12"/>
      <FInput label="Player Name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Alex Johnson"/>
      <div style={{marginBottom:20}}>
        <label style={{display:"block",fontSize:"0.7rem",letterSpacing:1,color:"#888",marginBottom:8,textTransform:"uppercase"}}>Position</label>
        <div style={{display:"flex",gap:10}}>
          {["player","quarterback"].map(pos=>(
            <button key={pos} onClick={()=>togglePos(pos)} style={{flex:1,background:form.positions.includes(pos)?(pos==="quarterback"?"#ff6b3533":"#00e5ff22"):"#1a2636",border:`1.5px solid ${form.positions.includes(pos)?(pos==="quarterback"?"#ff6b35":"#00e5ff"):"#2a3a4a"}`,borderRadius:10,padding:"12px 8px",cursor:"pointer",color:"#fff",fontFamily:"inherit",fontWeight:700,fontSize:"0.8125rem"}}>{pos==="quarterback"?"🏈 QB":"🏃 Player"}</button>
          ))}
        </div>
      </div>
      <Btn full onClick={()=>canSave&&onSave(form)} style={{marginBottom:10,opacity:canSave?1:.5}}>Save Changes</Btn>
      <button onClick={()=>setConfirm(true)} style={{width:"100%",background:"transparent",border:"1px solid #ef444444",color:"#ef4444",borderRadius:10,padding:"12px",fontSize:"0.875rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Remove Player…</button>
    </Sheet>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [data,      setData]      = useState(()=>load()||defState());
  const [tab,       setTab]       = useState(0);
  const [modal,     setModal]     = useState(null);
  const [toast,     setToast]     = useState(null);
  const [drill,     setDrill]     = useState(null);
  const [showShare, setShowShare] = useState(false);
  const [editPlayer,setEditPlayer]= useState(null);

  // Input state
  const [iPlayerId, setIPlayerId] = useState(null);
  const [iResult,   setIResult]   = useState("");
  const [iQbId,     setIQbId]     = useState("");
  const [iYards,    setIYards]    = useState("");  // short|medium|long
  const [iTD,       setITD]       = useState(null); // true|false

  const [pForm, setPForm] = useState({number:"",name:"",positions:[]});
  const [gForm, setGForm] = useState(data.gameInfo);

  const urlParams = useMemo(()=>new URLSearchParams(window.location.search),[]);
  const teamParam = useMemo(()=>urlParams.get("team"),[]);

  const update    = fn => setData(prev=>{ const next=fn(prev); save(next); return next; });
  const showToast = (msg,color="#00e5ff") => { setToast({msg,color}); setTimeout(()=>setToast(null),2500); };

  const cfg      = resultCfg(iResult);
  const qbs      = data.players.filter(p=>p.positions.includes("quarterback"));
  const needsQb  = cfg.needsQb;
  const needsYards = cfg.needsYards;
  const needsTD  = cfg.needsTD;

  // Determine if we can submit
  const canSubmit = iPlayerId && iResult
    && (needsQb ? iQbId : true)
    && (needsYards ? iYards : true)
    && (needsTD ? iTD !== null : true);

  const resetInput = () => { setIPlayerId(null); setIResult(""); setIQbId(""); setIYards(""); setITD(null); };

  const submitPlay = () => {
    if (!canSubmit) return;
    update(prev=>({...prev,plays:[...prev.plays,{
      id:uid(), ts:Date.now(),
      playerId:iPlayerId, result:iResult,
      qbId: needsQb ? iQbId : null,
      yards: needsYards ? iYards : null,
      touchdown: needsTD ? iTD : false,
      gameNumber:prev.gameInfo.gameNumber, gameType:prev.gameInfo.type,
      gameDate:prev.gameInfo.date, team:prev.gameInfo.team
    }]}));
    showToast(iTD ? "🏆 TOUCHDOWN! ✓" : "Play recorded! ✓", iTD ? "#ffd700" : "#00e5ff");
    resetInput();
  };

  const togglePos    = pos => setPForm(f=>({...f,positions:f.positions.includes(pos)?f.positions.filter(p=>p!==pos):[...f.positions,pos]}));
  const submitPlayer = () => {
    if (!pForm.number||!pForm.name||pForm.positions.length===0){showToast("Fill all fields!","#ff6b35");return;}
    update(prev=>({...prev,players:[...prev.players,{id:uid(),...pForm}]}));
    setPForm({number:"",name:"",positions:[]}); showToast("Player added!"); setModal(null);
  };
  const submitGame = () => { update(prev=>({...prev,gameInfo:gForm})); showToast("Game info saved!"); setModal(null); };
  const saveEditPlayer   = form => { update(prev=>({...prev,players:prev.players.map(p=>p.id===editPlayer.id?{...p,...form}:p)})); showToast("Player updated! ✓"); setEditPlayer(null); };
  const deleteEditPlayer = ()   => { update(prev=>({...prev,players:prev.players.filter(p=>p.id!==editPlayer.id),plays:prev.plays.filter(p=>p.playerId!==editPlayer.id)})); showToast(`${editPlayer.name} removed`,"#ef4444"); setEditPlayer(null); };

  // ── Stats computation ─────────────────────────────────────────────────────
  const allStats = data.players.map(p=>{
    const myPlays    = data.plays.filter(pl=>pl.playerId===p.id);
    const caught     = myPlays.filter(pl=>pl.result==="caught");
    const missed     = myPlays.filter(pl=>pl.result==="missed");
    const flag       = myPlays.filter(pl=>pl.result==="flag");
    const interceptions = myPlays.filter(pl=>pl.result==="interception");
    const tdPlays    = myPlays.filter(pl=>pl.touchdown===true);
    const tds        = tdPlays.length;
    // Yard score: short=1, medium=2, long=3 — average across caught + interception plays
    const yardPlays  = myPlays.filter(pl=>pl.yards);
    const totalYardScore = yardPlays.reduce((sum,pl)=>sum+yardScore(pl.yards),0);
    const avgYards   = yardPlays.length ? +(totalYardScore/yardPlays.length).toFixed(1) : 0;

    const isQb   = p.positions.includes("quarterback");
    const thrown = data.plays.filter(pl=>pl.qbId===p.id&&(pl.result==="caught"||pl.result==="missed"));
    const comp   = thrown.filter(pl=>pl.result==="caught");
    const inc    = thrown.filter(pl=>pl.result==="missed");
    const compPct= thrown.length?Math.round(comp.length/thrown.length*100):0;

    // Score: catches×2 + flags + TDs×3 + interceptions×2
    const score = caught.length*2 + flag.length + tds*3 + interceptions.length*2;
    return {...p,myPlays,caught,missed,flag,interceptions,tdPlays,tds,totalYardScore,avgYards,isQb,thrown,comp,inc,compPct,score};
  });

  const maxCatches  = Math.max(1,...allStats.map(p=>p.caught.length));
  const maxFlags    = Math.max(1,...allStats.map(p=>p.flag.length));
  const maxAvgYards = Math.max(1,...allStats.map(p=>p.avgYards));
  const ranked      = [...allStats].sort((a,b)=>b.score-a.score);

  if (teamParam) return <LiveView binId={teamParam}/>;

  const recentClr = {caught:"#22c55e",missed:"#ef4444",flag:"#f59e0b",interception:"#3b82f6"};
  const recentIco = {caught:"🙌",missed:"❌",flag:"🚩",interception:"🛡"};

  return (
    <div className="app-shell">
      {/* HEADER */}
      <div style={{background:"linear-gradient(160deg,#0a1e35 0%,#05111e 100%)",padding:"24px 20px 0",position:"relative",overflow:"hidden"}}>
        <svg style={{position:"absolute",top:0,right:0,opacity:.05}} width="200" height="100" viewBox="0 0 200 100">{[0,20,40,60,80,100,120,140,160,180,200].map(x=><line key={x} x1={x} y1="0" x2={x} y2="100" stroke="#fff" strokeWidth=".5"/>)}<line x1="0" y1="50" x2="200" y2="50" stroke="#fff" strokeWidth="1"/></svg>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <svg width="36" height="36" viewBox="0 0 36 36"><ellipse cx="18" cy="18" rx="14" ry="9" fill="#c97b3c"/><ellipse cx="18" cy="18" rx="14" ry="9" fill="none" stroke="#a0612c" strokeWidth="1.5"/><line x1="8" y1="18" x2="28" y2="18" stroke="#fff" strokeWidth="1.5"/><line x1="14" y1="13" x2="14" y2="23" stroke="#fff" strokeWidth="1.2"/><line x1="18" y1="11" x2="18" y2="25" stroke="#fff" strokeWidth="1.2"/><line x1="22" y1="13" x2="22" y2="23" stroke="#fff" strokeWidth="1.2"/></svg>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.375rem",letterSpacing:4,lineHeight:1,background:"linear-gradient(90deg,#fff 0%,#00e5ff 60%,#0090a8 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>FieldIQ</div>
            <div style={{fontSize:"0.625rem",color:"#00e5ff99",letterSpacing:3,textTransform:"uppercase",marginTop:-2}}>Flag Football Tracker</div>
          </div>
          {data.gameInfo.team&&<div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontSize:"0.75rem",color:"#00e5ff",fontWeight:700}}>{data.gameInfo.team}</div>{data.gameInfo.gameNumber&&<div style={{fontSize:"0.625rem",color:"#666"}}>Game #{data.gameInfo.gameNumber}</div>}</div>}
        </div>
        <div style={{display:"flex"}}>
          {["⚙ Setup","✚ Input","📊 Player IQ"].map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)} style={{flex:1,background:"none",border:"none",padding:"12px 0",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:"0.8125rem",letterSpacing:.5,color:tab===i?"#00e5ff":"#556",borderBottom:tab===i?"2px solid #00e5ff":"2px solid transparent",transition:"all .2s"}}>{t}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"1rem"}} key={tab}>

        {/* ── SETUP ── */}
        {tab===0&&(
          <div>
            <p style={{color:"#888",fontSize:"0.8125rem",marginBottom:16,lineHeight:1.5}}>Add players and set game info before tracking.</p>
            <div style={{display:"flex",gap:10,marginBottom:24}}>
              <button onClick={()=>{setPForm({number:"",name:"",positions:[]});setModal("addPlayer");}} style={{flex:1,background:"linear-gradient(135deg,#00e5ff18,#00e5ff08)",border:"1px solid #00e5ff44",borderRadius:14,padding:"18px 12px",cursor:"pointer",textAlign:"center",color:"#fff"}}>
                <div style={{fontSize:"1.625rem",marginBottom:5}}>👤</div><div style={{fontWeight:700,fontSize:"0.8125rem"}}>Add Player</div><div style={{fontSize:"0.7rem",color:"#888",marginTop:1}}>{data.players.length} added</div>
              </button>
              <button onClick={()=>{setGForm(data.gameInfo);setModal("gameInfo");}} style={{flex:1,background:"linear-gradient(135deg,#ff6b3518,#ff6b3508)",border:"1px solid #ff6b3544",borderRadius:14,padding:"18px 12px",cursor:"pointer",textAlign:"center",color:"#fff"}}>
                <div style={{fontSize:"1.625rem",marginBottom:5}}>🏟</div><div style={{fontWeight:700,fontSize:"0.8125rem"}}>Game Info</div><div style={{fontSize:"0.7rem",color:"#888",marginTop:1}}>{data.gameInfo.team||"Not set"}</div>
              </button>
              <button onClick={()=>setModal("backup")} style={{flex:1,background:"linear-gradient(135deg,#f59e0b18,#f59e0b08)",border:"1px solid #f59e0b44",borderRadius:14,padding:"18px 12px",cursor:"pointer",textAlign:"center",color:"#fff"}}>
                <div style={{fontSize:"1.625rem",marginBottom:5}}>💾</div><div style={{fontWeight:700,fontSize:"0.8125rem"}}>Backup</div><div style={{fontSize:"0.7rem",color:"#888",marginTop:1}}>Export / Import</div>
              </button>
            </div>
            {data.players.length>0&&(
              <>
                <div style={{fontSize:"0.7rem",color:"#888",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Roster — tap a player to edit</div>
                {data.players.map(p=>{ const pc=data.plays.filter(pl=>pl.playerId===p.id).length; return (
                  <div key={p.id} onClick={()=>setEditPlayer(p)} style={{background:"#1a2636",borderRadius:12,padding:"12px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:12,cursor:"pointer",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="#1e2e40"} onMouseLeave={e=>e.currentTarget.style.background="#1a2636"}>
                    <div style={{background:"#00e5ff22",color:"#00e5ff",fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.125rem",borderRadius:7,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{p.number}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:"0.875rem"}}>{p.name}</div>
                      <div style={{display:"flex",gap:4,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
                        {p.positions.map(pos=><Badge key={pos} color={pos==="quarterback"?"#ff6b35":"#00e5ff"}>{pos==="quarterback"?"QB":"Player"}</Badge>)}
                        {pc>0&&<span style={{fontSize:"0.625rem",color:"#556"}}>{pc} play{pc!==1?"s":""}</span>}
                      </div>
                    </div>
                    <div style={{color:"#445",fontSize:"0.75rem",flexShrink:0}}>✏️</div>
                  </div>
                ); })}
              </>
            )}
            {data.players.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#556"}}><div style={{fontSize:"2.5rem",marginBottom:10}}>🏈</div><div style={{fontSize:"0.875rem"}}>No players yet. Tap "Add Player" to get started!</div></div>}
          </div>
        )}

        {/* ── INPUT ── */}
        {tab===1&&(
          <div>
            {data.players.length===0?(
              <div style={{textAlign:"center",padding:"50px 20px",color:"#556"}}>
                <div style={{fontSize:"2.5rem",marginBottom:10}}>⚙️</div><div style={{fontSize:"0.875rem",marginBottom:16}}>Add players in Setup first!</div>
                <Btn onClick={()=>setTab(0)} variant="ghost">Go to Setup →</Btn>
              </div>
            ):(
              <>
                <p style={{color:"#888",fontSize:"0.8125rem",marginBottom:18,lineHeight:1.5}}>Record each play as it happens.</p>
                <div style={{background:"#0f1923",borderRadius:16,padding:16,border:"1px solid #1a2a3a"}}>

                  {/* Step 1 */}
                  <div style={{fontSize:"0.7rem",color:"#00e5ff99",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Step 1 — Who had the play?</div>
                  <PlayerSearch players={data.players} value={iPlayerId} onChange={id=>{setIPlayerId(id);setIResult("");setIQbId("");setIYards("");setITD(null);}}/>

                  {/* Step 2 */}
                  {iPlayerId&&(
                    <div>
                      <div style={{fontSize:"0.7rem",color:"#00e5ff99",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Step 2 — What happened?</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                        {RESULTS.map(opt=>(
                          <button key={opt.value} onClick={()=>{setIResult(opt.value);setIQbId("");setIYards("");setITD(null);}}
                            style={{background:iResult===opt.value?opt.color+"33":"#1a2636",border:`1.5px solid ${iResult===opt.value?opt.color:"#2a3a4a"}`,borderRadius:10,padding:"12px 8px",cursor:"pointer",color:"#fff",fontSize:"0.8125rem",fontWeight:700,fontFamily:"inherit",transition:"all .15s",textAlign:"left"}}>
                            {opt.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Step 3: QB */}
                  {iPlayerId&&needsQb&&(
                    <div>
                      <div style={{fontSize:"0.7rem",color:"#ff6b3599",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Step 3 — Which QB threw it?</div>
                      {qbs.length===0?<div style={{color:"#666",fontSize:"0.8125rem",marginBottom:14}}>No QBs set up yet!</div>:<FSelect value={iQbId} onChange={e=>setIQbId(e.target.value)} placeholder="Select QB…" options={qbs.map(q=>({value:q.id,label:`#${q.number} ${q.name}`}))}/>}
                    </div>
                  )}

                  {/* Step 4: Yards */}
                  {iPlayerId&&needsYards&&(
                    <div>
                      <div style={{fontSize:"0.7rem",color:"#a855f799",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
                        {needsQb ? "Step 4" : "Step 3"} — How many yards?
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                        {YARD_RANGES.map(yr=>(
                          <button key={yr.value} onClick={()=>setIYards(yr.value)}
                            style={{background:iYards===yr.value?"#a855f733":"#1a2636",border:`1.5px solid ${iYards===yr.value?"#a855f7":"#2a3a4a"}`,borderRadius:10,padding:"10px 4px",cursor:"pointer",color:"#fff",fontSize:"0.75rem",fontWeight:700,fontFamily:"inherit",transition:"all .15s",textAlign:"center",lineHeight:1.4}}>
                            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.5rem",color:iYards===yr.value?"#a855f7":"#556",lineHeight:1}}>{yr.score}</div>
                            <div style={{marginTop:2}}>{yr.label}</div>
                            <div style={{fontSize:"0.6rem",color:"#888",marginTop:1}}>{yr.sub}</div>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Step 5: TD? */}
                  {iPlayerId&&needsTD&&(
                    <div>
                      <div style={{fontSize:"0.7rem",color:"#ffd70099",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
                        {needsQb ? (iYards ? "Step 5" : "Step 4") : (iYards ? "Step 4" : "Step 3")} — Was it a Touchdown?
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                        <button onClick={()=>setITD(true)} style={{background:iTD===true?"#ffd70033":"#1a2636",border:`1.5px solid ${iTD===true?"#ffd700":"#2a3a4a"}`,borderRadius:10,padding:"12px",cursor:"pointer",color:"#fff",fontSize:"0.875rem",fontWeight:700,fontFamily:"inherit",transition:"all .15s"}}>🏆 Yes, TD!</button>
                        <button onClick={()=>setITD(false)} style={{background:iTD===false?"#22c55e33":"#1a2636",border:`1.5px solid ${iTD===false?"#22c55e":"#2a3a4a"}`,borderRadius:10,padding:"12px",cursor:"pointer",color:"#fff",fontSize:"0.875rem",fontWeight:700,fontFamily:"inherit",transition:"all .15s"}}>✓ No TD</button>
                      </div>
                    </div>
                  )}

                  {canSubmit&&<Btn full onClick={submitPlay} style={{background:iTD===true?"linear-gradient(135deg,#ffd700,#f59e0b)":"linear-gradient(135deg,#00e5ff,#0090a8)"}}>
                    {iTD===true ? "🏆 Record Touchdown!" : "Record Play ✓"}
                  </Btn>}
                </div>

                {/* Recent plays */}
                {data.plays.length>0&&(
                  <div style={{marginTop:22}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{fontSize:"0.7rem",color:"#888",letterSpacing:2,textTransform:"uppercase"}}>Recent Plays ({data.plays.length})</div>
                      <button onClick={()=>{if(window.confirm("Clear all plays?"))update(prev=>({...prev,plays:[]}));}} style={{background:"none",border:"none",color:"#c0392b",fontSize:"0.75rem",cursor:"pointer"}}>Clear all</button>
                    </div>
                    {[...data.plays].reverse().slice(0,8).map(play=>{
                      const player=data.players.find(p=>p.id===play.playerId), qb=play.qbId?data.players.find(p=>p.id===play.qbId):null;
                      const clr=recentClr[play.result]||"#888", ico=recentIco[play.result]||"•";
                      return(
                        <div key={play.id} style={{background:"#1a2636",borderRadius:10,padding:"9px 13px",marginBottom:6,display:"flex",alignItems:"center",gap:10,borderLeft:`3px solid ${clr}`}}>
                          <span style={{fontSize:"1.0625rem"}}>{ico}{play.touchdown?" 🏆":""}</span>
                          <div>
                            <span style={{fontWeight:700,fontSize:"0.8125rem"}}>#{player?.number} {player?.name}</span>

                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* ── PLAYER IQ ── */}
        {tab===2&&(
          <div>
            {data.plays.length===0?(
              <div style={{textAlign:"center",padding:"50px 20px",color:"#556"}}>
                <div style={{fontSize:"2.5rem",marginBottom:10}}>📊</div><div style={{fontSize:"0.875rem",marginBottom:16}}>No plays recorded yet!</div>

              </div>
            ):(
              <>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>

                    <span style={{fontSize:"1rem"}}>↗</span> Share
                  </button>
                </div>
                <div style={{fontSize:"0.65rem",color:"#445",marginBottom:14,lineHeight:1.6}}>
                  Score = catches×2 + flags + TDs×3 + INTs×2 &nbsp;·&nbsp; <span style={{color:"#556"}}>Tap a row to expand</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 12px",marginBottom:6}}>
                  <div style={{width:18}}/><div style={{width:30}}/><div style={{flex:1}}/>
                  <div style={{fontSize:"0.5rem",color:"#445",letterSpacing:.8,textTransform:"uppercase",display:"flex",gap:10,marginRight:4}}>
                    <span style={{color:"#22c55e55"}}>C</span><span style={{color:"#f59e0b55"}}>F</span><span style={{color:"#ffd70055"}}>TD</span><span style={{color:"#3b82f655"}}>INT</span>
                  </div>
                  <div style={{fontSize:"0.5rem",color:"#445",letterSpacing:.8,textTransform:"uppercase",width:38,textAlign:"right"}}>IQ</div>
                  <div style={{width:14}}/>
                </div>
                {ranked.map((p,i)=>(
                  <PlayerCard key={p.id} p={p} rank={i} maxCatches={maxCatches} maxFlags={maxFlags} maxAvgYards={maxAvgYards} onDrill={(name,label,plays,color)=>setDrill({playerName:name,statLabel:label,plays,color})}/>
                ))}
              </>
            )}
          </div>
        )}
      </div>

      {/* MODALS */}
      {modal==="addPlayer"&&(
        <Sheet title="Add Player" onClose={()=>setModal(null)}>
          <FInput label="Jersey Number" type="number" value={pForm.number} onChange={e=>setPForm(f=>({...f,number:e.target.value}))} placeholder="e.g. 12"/>
          <FInput label="Player Name" value={pForm.name} onChange={e=>setPForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Alex Johnson"/>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:"0.7rem",letterSpacing:1,color:"#888",marginBottom:8,textTransform:"uppercase"}}>Position (select all that apply)</label>
            <div style={{display:"flex",gap:10}}>
              {["player","quarterback"].map(pos=>(
                <button key={pos} onClick={()=>togglePos(pos)} style={{flex:1,background:pForm.positions.includes(pos)?(pos==="quarterback"?"#ff6b3533":"#00e5ff22"):"#1a2636",border:`1.5px solid ${pForm.positions.includes(pos)?(pos==="quarterback"?"#ff6b35":"#00e5ff"):"#2a3a4a"}`,borderRadius:10,padding:"12px 8px",cursor:"pointer",color:"#fff",fontFamily:"inherit",fontWeight:700,fontSize:"0.8125rem"}}>{pos==="quarterback"?"🏈 QB":"🏃 Player"}</button>
              ))}
            </div>
          </div>
          <Btn full onClick={submitPlayer}>Save Player</Btn>
        </Sheet>
      )}
      {modal==="gameInfo"&&(
        <Sheet title="Game Info" onClose={()=>setModal(null)} accent="#ff6b35">
          <div style={{background:"#1a2636",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:"0.75rem",color:"#888",lineHeight:1.6}}>ℹ️ Update before each new game. Each play saves a snapshot so stats stay accurate across games.</div>
          <FInput label="Team Name" value={gForm.team} onChange={e=>setGForm(f=>({...f,team:e.target.value}))} placeholder="e.g. Thunder Hawks"/>
          <FInput label="Game Number" type="number" value={gForm.gameNumber} onChange={e=>setGForm(f=>({...f,gameNumber:e.target.value}))} placeholder="e.g. 3"/>
          <FInput label="Date" type="date" value={gForm.date} onChange={e=>setGForm(f=>({...f,date:e.target.value}))}/>
          <FSelect label="Type of Game" value={gForm.type} onChange={e=>setGForm(f=>({...f,type:e.target.value}))} placeholder="Select type…" options={[{value:"Regular Season",label:"Regular Season"},{value:"Playoff",label:"Playoff"},{value:"Championship",label:"Championship"},{value:"Scrimmage",label:"Scrimmage"},{value:"Tournament",label:"Tournament"}]}/>
          <Btn full onClick={submitGame}>Save Game Info</Btn>
        </Sheet>
      )}
      {modal==="backup"&&<BackupSheet data={data} onImport={imported=>update(()=>imported)} onClose={()=>setModal(null)} showToast={showToast}/>}
      {drill&&<DrillDown {...drill} allPlayers={data.players} onClose={()=>setDrill(null)}/>}
      {showShare&&<ShareSheet ranked={ranked} gameInfo={data.gameInfo} onClose={()=>setShowShare(false)}/>}
      {editPlayer&&<EditPlayerSheet player={editPlayer} playCount={data.plays.filter(p=>p.playerId===editPlayer.id).length} onSave={saveEditPlayer} onDelete={deleteEditPlayer} onClose={()=>setEditPlayer(null)}/>}
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.color+"ee",color:"#fff",padding:"12px 24px",borderRadius:50,fontWeight:700,fontSize:"0.875rem",zIndex:300,animation:"toastIn .3s ease",whiteSpace:"nowrap",boxShadow:`0 4px 20px ${toast.color}66`}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
